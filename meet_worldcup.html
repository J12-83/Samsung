<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지금 만나고 싶은 사람 월드컵</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* 배경 파티클 */
        .bg-particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* 인트로 화면 */
        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .screen.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        /* 인트로 */
        #intro {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%);
        }

        .intro-title {
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcbff, #c56bff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .intro-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 3rem;
            text-align: center;
        }

        .start-btn {
            padding: 18px 60px;
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff6b6b, #c56bff);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(197, 107, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .start-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 50px rgba(197, 107, 255, 0.5);
        }

        /* 배틀 화면 */
        #battle {
            background: #0a0a1a;
        }

        .battle-header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 20;
        }

        .round-info {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .chapter-title {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 진행 바 */
        .progress-bar {
            position: absolute;
            top: 0; left: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff6b6b, #c56bff);
            transition: width 0.8s ease;
            z-index: 30;
        }

        /* VS 구분선 */
        .vs-divider {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
            z-index: 15;
        }

        .vs-badge {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 25;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ff6b6b, #c51111);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 0 40px rgba(255, 50, 50, 0.5);
            animation: vsPulse 2s ease infinite;
        }

        @keyframes vsPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        /* 카드 영역 */
        .battle-area {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .card-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card-side::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0);
            transition: background 0.3s ease;
            z-index: 1;
        }

        .card-side:hover::before {
            background: rgba(255, 255, 255, 0.05);
        }

        .card-side:hover {
            flex: 1.05;
        }

        .card-side:hover .person-img-wrapper {
            transform: scale(1.05);
        }

        .card-side.left {
            background: linear-gradient(135deg, #1a0a2e 0%, #0a0a1a 100%);
        }

        .card-side.right {
            background: linear-gradient(225deg, #0a1a2e 0%, #0a0a1a 100%);
        }

        .person-img-wrapper {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            z-index: 2;
            position: relative;
        }

        .card-side.left .person-img-wrapper {
            border-color: rgba(255, 107, 107, 0.4);
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.15);
        }

        .card-side.right .person-img-wrapper {
            border-color: rgba(107, 203, 255, 0.4);
            box-shadow: 0 0 40px rgba(107, 203, 255, 0.15);
        }

        .card-side:hover .person-img-wrapper {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.15);
        }

        .person-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .person-name {
            margin-top: 20px;
            font-size: 1.6rem;
            font-weight: 700;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .person-desc {
            margin-top: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            z-index: 2;
        }

        .pick-hint {
            position: absolute;
            bottom: 40px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.2);
            z-index: 2;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card-side:hover .pick-hint {
            opacity: 1;
        }

        /* 선택 애니메이션 */
        .card-side.selected {
            animation: selectFlash 0.5s ease;
        }

        @keyframes selectFlash {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
            100% { filter: brightness(1); }
        }

        .card-side.eliminated {
            opacity: 0.2;
            filter: grayscale(1);
            pointer-events: none;
        }

        /* 챕터 전환 애니메이션 */
        .card-side.slide-in-left {
            animation: slideInLeft 0.6s ease;
        }

        .card-side.slide-in-right {
            animation: slideInRight 0.6s ease;
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* 결과 화면 */
        #result {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%);
        }

        .result-label {
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 10px;
        }

        .result-title {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .winner-img-wrapper {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid rgba(255, 215, 0, 0.6);
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.3), 0 0 120px rgba(255, 107, 107, 0.15);
            animation: winnerGlow 3s ease infinite;
            margin-bottom: 30px;
        }

        @keyframes winnerGlow {
            0%, 100% { box-shadow: 0 0 80px rgba(255, 215, 0, 0.3), 0 0 120px rgba(255, 107, 107, 0.15); }
            50% { box-shadow: 0 0 100px rgba(255, 215, 0, 0.5), 0 0 150px rgba(255, 107, 107, 0.25); }
        }

        .winner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .winner-name {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .winner-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 50px;
        }

        .go-meet {
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 40px;
            padding: 10px 30px;
            background: linear-gradient(135deg, #ff3c3c, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: goMeetPulse 1.5s ease infinite;
            text-shadow: none;
        }

        @keyframes goMeetPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .restart-btn {
            padding: 15px 50px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* 축하 파티클 */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .confetti {
            position: absolute;
            top: -10px;
            width: 10px;
            height: 10px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* 크라운 아이콘 */
        .crown {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: crownBounce 2s ease infinite;
        }

        @keyframes crownBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .intro-title { font-size: 2rem; }
            .intro-subtitle { font-size: 0.9rem; padding: 0 20px; }
            .start-btn { padding: 15px 45px; font-size: 1.1rem; }

            .battle-area {
                flex-direction: column;
            }

            .vs-divider {
                top: 50%; left: 0;
                width: 100%; height: 2px;
                transform: translateY(-50%);
            }

            .vs-badge {
                width: 55px; height: 55px;
                font-size: 1.2rem;
            }

            .card-side:hover { flex: 1; }

            .person-img-wrapper { width: 120px; height: 120px; }
            .person-name { font-size: 1.1rem; margin-top: 12px; }
            .person-desc { font-size: 0.8rem; }

            .battle-header {
                top: 10px;
            }
            .round-info { font-size: 0.8rem; }
            .chapter-title { font-size: 1.3rem; }

            .pick-hint {
                bottom: 15px;
                font-size: 0.75rem;
                opacity: 1;
                color: rgba(255, 255, 255, 0.15);
            }

            .crown { font-size: 2.2rem; margin-bottom: 8px; }
            .result-label { font-size: 0.8rem; letter-spacing: 3px; }
            .result-title { font-size: 1.3rem; margin-bottom: 25px; }
            .winner-img-wrapper { width: 180px; height: 180px; }
            .winner-name { font-size: 1.6rem; }
            .winner-desc { font-size: 0.85rem; margin-bottom: 15px; }
            .go-meet { font-size: 1.1rem; margin-bottom: 25px; }
            .restart-btn { padding: 12px 40px; font-size: 1rem; }
        }

        @media (max-width: 400px) {
            .intro-title { font-size: 1.7rem; }
            .person-img-wrapper { width: 100px; height: 100px; }
            .person-name { font-size: 1rem; }
            .vs-badge { width: 45px; height: 45px; font-size: 1rem; }
            .winner-img-wrapper { width: 150px; height: 150px; }
            .winner-name { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <!-- 배경 파티클 -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- 인트로 화면 -->
    <div class="screen" id="intro">
        <div class="intro-title">지금 만나고 싶은 사람<br>월드컵</div>
        <div class="intro-subtitle">5라운드를 거쳐 당신이 가장 만나고 싶은 사람을 찾아보세요</div>
        <button class="start-btn" onclick="startGame()">시작하기</button>
    </div>

    <!-- 배틀 화면 -->
    <div class="screen hidden" id="battle">
        <div class="progress-bar" id="progressBar"></div>
        <div class="battle-header">
            <div class="round-info" id="roundInfo">CHAPTER 1 / 5</div>
            <div class="chapter-title" id="chapterTitle">누구를 만나고 싶나요?</div>
        </div>

        <div class="vs-divider"></div>
        <div class="vs-badge">VS</div>

        <div class="battle-area">
            <div class="card-side left" id="cardLeft" onclick="selectPerson('left')">
                <div class="person-img-wrapper">
                    <img class="person-img" id="imgLeft" src="" alt="">
                </div>
                <div class="person-name" id="nameLeft"></div>
                <div class="person-desc" id="descLeft"></div>
                <div class="pick-hint">클릭하여 선택</div>
            </div>
            <div class="card-side right" id="cardRight" onclick="selectPerson('right')">
                <div class="person-img-wrapper">
                    <img class="person-img" id="imgRight" src="" alt="">
                </div>
                <div class="person-name" id="nameRight"></div>
                <div class="person-desc" id="descRight"></div>
                <div class="pick-hint">클릭하여 선택</div>
            </div>
        </div>
    </div>

    <!-- 결과 화면 -->
    <div class="screen hidden" id="result">
        <div class="confetti-container" id="confettiContainer"></div>
        <div class="crown">👑</div>
        <div class="result-label">FINAL WINNER</div>
        <div class="result-title">당신이 가장 만나고 싶은 사람</div>
        <div class="winner-img-wrapper">
            <img class="winner-img" id="winnerImg" src="" alt="">
        </div>
        <div class="winner-name" id="winnerName"></div>
        <div class="winner-desc" id="winnerDesc"></div>
        <div class="go-meet">오늘 만나러 가세요</div>
        <button class="restart-btn" onclick="restartGame()">다시 하기</button>
    </div>

    <script>
        // ============================================
        // 여기서 인물 데이터를 수정하세요!
        // img: 이미지 경로 또는 URL
        // name: 이름
        // desc: 설명 (직업, 특징 등)
        // ============================================
        const PEOPLE = [
            {
                id: 1,
                name: "신하균",
                desc: "배우",
                img: "images/shin_hakyun.jpg"
            },
            {
                id: 2,
                name: "뷔",
                desc: "BTS",
                img: "images/v.jpg"
            },
            {
                id: 3,
                name: "강하늘",
                desc: "배우",
                img: "images/kang_haneul.jpg"
            },
            {
                id: 4,
                name: "신유",
                desc: "아이돌",
                img: "images/shinyu.jpg"
            },
            {
                id: 5,
                name: "차은우",
                desc: "ASTRO",
                img: "images/cha_eunwoo.jpg"
            },
            {
                id: 6,
                name: "강동원",
                desc: "배우",
                img: "images/kang_dongwon.jpg"
            }
        ];

        const TOTAL_CHAPTERS = 5;

        let currentChapter = 0;
        let currentWinner = null;
        let challengers = [];
        let isSelecting = false;

        // 배경 파티클 생성
        function createBgParticles() {
            const container = document.getElementById('bgParticles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 10 + 10) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(p);
            }
        }

        // 게임 시작
        function startGame() {
            // 인물 리스트를 섞기
            const shuffled = [...PEOPLE].sort(() => Math.random() - 0.5);

            // 첫 챕터: 첫 두 명 대결
            currentWinner = null;
            currentChapter = 0;

            // challengers: 챕터별로 등장할 인물 배열
            // 챕터1: shuffled[0] vs shuffled[1]
            // 챕터2: 이전 승자 vs shuffled[2]
            // ...
            challengers = shuffled;

            document.getElementById('intro').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('battle').classList.remove('hidden');
                loadChapter();
            }, 600);
        }

        // 챕터 로드
        function loadChapter() {
            currentChapter++;
            isSelecting = false;

            const cardLeft = document.getElementById('cardLeft');
            const cardRight = document.getElementById('cardRight');

            // 이전 클래스 정리
            cardLeft.classList.remove('selected', 'eliminated', 'slide-in-left', 'slide-in-right');
            cardRight.classList.remove('selected', 'eliminated', 'slide-in-left', 'slide-in-right');

            let leftPerson, rightPerson;

            if (currentChapter === 1) {
                leftPerson = challengers[0];
                rightPerson = challengers[1];
            } else {
                leftPerson = currentWinner;
                rightPerson = challengers[currentChapter];
            }

            // UI 업데이트
            document.getElementById('roundInfo').textContent = `CHAPTER ${currentChapter} / ${TOTAL_CHAPTERS}`;
            document.getElementById('progressBar').style.width = ((currentChapter - 1) / TOTAL_CHAPTERS * 100) + '%';

            document.getElementById('imgLeft').src = leftPerson.img;
            document.getElementById('imgLeft').alt = leftPerson.name;
            document.getElementById('nameLeft').textContent = leftPerson.name;
            document.getElementById('descLeft').textContent = leftPerson.desc;
            cardLeft.dataset.personId = leftPerson.id;

            document.getElementById('imgRight').src = rightPerson.img;
            document.getElementById('imgRight').alt = rightPerson.name;
            document.getElementById('nameRight').textContent = rightPerson.name;
            document.getElementById('descRight').textContent = rightPerson.desc;
            cardRight.dataset.personId = rightPerson.id;

            // 슬라이드 인 애니메이션
            requestAnimationFrame(() => {
                cardLeft.classList.add('slide-in-left');
                cardRight.classList.add('slide-in-right');
            });
        }

        // 인물 선택
        function selectPerson(side) {
            if (isSelecting) return;
            isSelecting = true;

            const cardLeft = document.getElementById('cardLeft');
            const cardRight = document.getElementById('cardRight');

            const selectedCard = side === 'left' ? cardLeft : cardRight;
            const eliminatedCard = side === 'left' ? cardRight : cardLeft;

            selectedCard.classList.add('selected');
            eliminatedCard.classList.add('eliminated');

            // 선택된 인물 저장
            const selectedId = parseInt(selectedCard.dataset.personId);
            currentWinner = challengers.find(p => p.id === selectedId);

            // 진행 바 업데이트
            document.getElementById('progressBar').style.width = (currentChapter / TOTAL_CHAPTERS * 100) + '%';

            if (currentChapter >= TOTAL_CHAPTERS) {
                // 최종 결과
                setTimeout(() => showResult(), 1000);
            } else {
                // 다음 챕터
                setTimeout(() => loadChapter(), 1000);
            }
        }

        // 결과 화면 표시
        function showResult() {
            document.getElementById('battle').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('result').classList.remove('hidden');
                // 누구를 골라도 이재일이 나온다
                document.getElementById('winnerImg').src = "images/lee_jaeil.jpg";
                document.getElementById('winnerName').textContent = "이재일";
                document.getElementById('winnerDesc').textContent = "당신이 진짜 만나고 싶은 사람";
                launchConfetti();
            }, 600);
        }

        // 축하 이펙트
        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const colors = ['#ff6b6b', '#ffd93d', '#6bcbff', '#c56bff', '#ff9ff3', '#54a0ff', '#5f27cd'];

            for (let i = 0; i < 80; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.width = (Math.random() * 8 + 5) + 'px';
                c.style.height = (Math.random() * 8 + 5) + 'px';
                c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                c.style.animationDuration = (Math.random() * 2 + 2) + 's';
                c.style.animationDelay = (Math.random() * 1.5) + 's';
                container.appendChild(c);
            }
        }

        // 다시 하기
        function restartGame() {
            document.getElementById('result').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('intro').classList.remove('hidden');
            }, 600);
        }

        // 초기화
        createBgParticles();
    </script>
</body>
</html>
